services:
  web:
    image: quiz-app:latest
    build: .
    container_name: quiz_app_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DATABASE_URL=postgresql://quiz_user:${DB_PASSWORD}@db:5432/quiz_app
      - BASE_URL=${BASE_URL}
      - FBQ_RESEND_API_KEY=${FBQ_RESEND_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID}
      - DO_SPACES_KEY=${DO_SPACES_KEY}
      - DO_SPACES_SECRET=${DO_SPACES_SECRET}
      - DO_SPACES_BUCKET=${DO_SPACES_BUCKET}
      - DO_SPACES_REGION=${DO_SPACES_REGION}
      - DO_SPACES_ENDPOINT=${DO_SPACES_ENDPOINT}
      - DO_SPACES_CDN_ENDPOINT=${DO_SPACES_CDN_ENDPOINT}
      - DO_SPACES_FOLDER=${DO_SPACES_FOLDER}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    volumes:
      - ./static/qrcodes:/app/static/qrcodes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quiz_network

  db:
    image: postgres:15-alpine
    container_name: quiz_app_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=quiz_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=quiz_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz_user -d quiz_app"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quiz_network

  nginx:
    image: nginx:alpine
    container_name: quiz_app_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - quiz_network

  certbot:
    image: certbot/certbot
    container_name: quiz_app_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
    external: true
    name: quiz-app_postgres_data

networks:
  quiz_network:
    driver: bridge
